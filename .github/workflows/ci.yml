name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hakeynoie
          POSTGRES_PASSWORD: hakeynoie_password
          POSTGRES_DB: hakeynoie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - uses: actions/cache@v4
        with:
          path: backend/deps
          key: deps-${{ hashFiles('backend/mix.lock') }}
          restore-keys: deps-

      - uses: actions/cache@v4
        with:
          path: backend/_build/test
          key: build-test-${{ hashFiles('backend/mix.lock') }}
          restore-keys: build-test-

      - name: Install dependencies
        working-directory: backend
        run: mix deps.get

      - name: Check formatting
        working-directory: backend
        run: mix format --check-formatted

      - name: Run tests
        working-directory: backend
        run: mix test
        env:
          MIX_ENV: test
          DB_HOSTNAME: localhost

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
