app = "hakeynoie"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "/app/bin/hakeynoie eval \"Hakeynoie.Release.migrate\""

[env]
  PORT = "8080"
  POOL_SIZE = "5"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
